name: Unit Tests

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    name: ${{ matrix.name }}

    env:
      QT_QPA_PLATFORM: offscreen

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: telemetrydata
            test_dir: tests/telemetrydata
            pro_file: telemetrydata_test.pro
            binary: telemetrydata_test
            headless: false

          - name: ui_camerapage
            test_dir: tests/ui_camerapage
            pro_file: ui_camerapage_test.pro
            binary: ui_camerapage_test
            headless: true

          - name: ui_homeassistant
            test_dir: tests/ui_homeassistant
            pro_file: ui_homeassistant_test.pro
            binary: ui_homeassistant_test
            headless: true

          - name: ui_mainwindow
            test_dir: tests/ui_mainwindow
            pro_file: ui_mainwindow_test.pro
            binary: ui_mainwindow_test
            headless: true

          - name: ui_mediapage
            test_dir: tests/ui_mediapage
            pro_file: ui_mediapage_test.pro
            binary: ui_mediapage_test
            headless: true

          - name: ui_navigationpage
            test_dir: tests/ui_navigationpage
            pro_file: ui_navigationpage_test.pro
            binary: ui_navigationpage_test
            headless: true

          - name: ui_settingspage
            test_dir: tests/ui_settingspage
            pro_file: ui_settingspage_test.pro
            binary: ui_settingspage_test
            headless: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            xvfb \
            libgl1 \
            libegl1 \
            libdbus-1-3 \
            libfontconfig1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-shm0 \
            libxcb-sync1 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libx11-xcb1

      - name: Install Qt 6.5.3
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.5.3
          cache: true

      - name: Show Qt version
        run: |
          qmake6 -v
          which qmake6 || true

      - name: Build test
        working-directory: ${{ matrix.test_dir }}
        run: |
          qmake6 "${{ matrix.pro_file }}"
          make -j"$(nproc)"

      - name: Run test
        working-directory: ${{ matrix.test_dir }}
        run: |
          if [ "${{ matrix.headless }}" = "true" ]; then
            xvfb-run -a -s "-screen 0 1920x1080x24" "./${{ matrix.binary }}"
          else
            "./${{ matrix.binary }}"
          fi
