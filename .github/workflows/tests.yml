name: Unit Tests

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: telemetrydata
            test_dir: tests/telemetrydata
            pro_file: telemetrydata_test.pro
            binary: telemetrydata_test
            headless: false
          - name: ui_camerapage
            test_dir: tests/ui_camerapage
            pro_file: ui_camerapage_test.pro
            binary: ui_camerapage_test
            headless: true
          - name: ui_homeassistant
            test_dir: tests/ui_homeassistant
            pro_file: ui_homeassistant_test.pro
            binary: ui_homeassistant_test
            headless: true
          - name: ui_mainwindow
            test_dir: tests/ui_mainwindow
            pro_file: ui_mainwindow_test.pro
            binary: ui_mainwindow_test
            headless: true
          - name: ui_mediapage
            test_dir: tests/ui_mediapage
            pro_file: ui_mediapage_test.pro
            binary: ui_mediapage_test
            headless: true
          - name: ui_navigationpage
            test_dir: tests/ui_navigationpage
            pro_file: ui_navigationpage_test.pro
            binary: ui_navigationpage_test
            headless: true
          - name: ui_settingspage
            test_dir: tests/ui_settingspage
            pro_file: ui_settingspage_test.pro
            binary: ui_settingspage_test
            headless: true

    name: ${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            qt6-base-dev \
            qt6-base-dev-tools \
            qt6-declarative-dev \
            qt6-positioning-dev \
            qt6-location-dev \
            qt6-serialport-dev \
            qt6-multimedia-dev \
            qt6-connectivity-dev \
            qt6-webengine-dev \
            qt6-virtualkeyboard-dev \
            xvfb

      - name: Build test
        working-directory: ${{ matrix.test_dir }}
        run: |
          qmake6 "${{ matrix.pro_file }}"
          make -j"$(nproc)"

      - name: Run test
        working-directory: ${{ matrix.test_dir }}
        run: |
          if [ "${{ matrix.headless }}" = "true" ]; then
            xvfb-run "./${{ matrix.binary }}"
          else
            "./${{ matrix.binary }}"
          fi
