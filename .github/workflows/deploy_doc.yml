name: Génération Doc Doxygen et UML

on:
  push:
    branches:
      - '**'

permissions:
  contents: write

# Force l'utilisation d'un environnement compatible avec les futures mises à jour GitHub
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer les outils (Doxygen, Graphviz, PlantUML)
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz plantuml python3-pip
          pip install hpp2plantuml

      - name: Générer le diagramme UML automatique
        run: |
          # 1. Lister les headers principaux (on évite les fichiers complexes pour le parsing)
          find . -maxdepth 1 -name "*.h" > headers_list.txt
          
          # 2. Générer le fichier .puml
          if [ -s headers_list.txt ]; then
            hpp2plantuml -i headers_list.txt -o architecture_auto.puml || echo "Erreur de parsing"
          fi
          
          # 3. NETTOYAGE CRITIQUE : Supprimer les erreurs de syntaxe générées par hpp2plantuml
          # On supprime tout ce qui se trouve avant la balise @startuml
          if [ -f architecture_auto.puml ]; then
            sed -i -n '/@startuml/,$p' architecture_auto.puml
            
            # 4. Conversion en SVG (PlantUML ne plantera plus avec l'exit code 200)
            plantuml -tsvg architecture_auto.puml || echo "Échec de la conversion PlantUML"
          else
            echo "Fichier puml non généré."
          fi

      - name: Générer la documentation Doxygen
        run: doxygen Doxyfile

      - name: Préparer les fichiers pour le déploiement
        run: |
          # S'assurer que le dossier de destination existe dans l'output Doxygen
          mkdir -p ./doc_output/html/images
          # Copier le diagramme s'il a été généré avec succès
          if [ -f architecture_auto.svg ]; then
            cp architecture_auto.svg ./doc_output/html/images/
          fi

      - name: Déployer sur GitHub Pages
        # Remplacez 'main' par 'documentation' si c'est le nom de votre branche principale
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./doc_output/html
