name: Génération Doc Doxygen et UML

on:
  push:
    branches:
      - '**'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer les outils
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz plantuml python3-pip
          pip install hpp2plantuml

      - name: Générer le diagramme UML automatique
        run: |
          # 1. Lister uniquement les fichiers headers sources, sans les fichiers générés par Qt
          find . -maxdepth 1 -name "*.h" -not -name "moc_*" > headers_list.txt
          
          # 2. Générer le fichier PUML (on ignore les erreurs de parsing individuelles)
          hpp2plantuml -i headers_list.txt -o architecture_auto.puml || true
          
          # 3. NETTOYAGE DE FORCE : On recrée un fichier propre si hpp2plantuml a pollué la sortie
          if [ -f architecture_auto.puml ]; then
            # On extrait uniquement ce qui est entre @startuml et @enduml
            sed -n '/@startuml/,/@enduml/p' architecture_auto.puml > clean_arch.puml
            mv clean_arch.puml architecture_auto.puml
            
            # On vérifie que le fichier n'est pas vide avant conversion
            if grep -q "@startuml" architecture_auto.puml; then
              plantuml -tsvg architecture_auto.puml
            else
              echo "Erreur: Le fichier PUML ne contient pas de diagramme valide."
            fi
          fi

      - name: Générer la documentation Doxygen
        run: doxygen Doxyfile

      - name: Préparer les fichiers pour le déploiement
        run: |
          mkdir -p ./doc_output/html/images
          [ -f architecture_auto.svg ] && cp architecture_auto.svg ./doc_output/html/images/

      - name: Déployer sur GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./doc_output/html
