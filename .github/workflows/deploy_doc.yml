name: Génération Doc Doxygen et UML

on:
  push:
    branches:
      - '**'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer les outils
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz plantuml python3-pip
          pip install hpp2plantuml

      - name: Générer le diagramme UML automatique
        shell: bash
        run: |
          set +e

          # On récupère uniquement les vrais headers source
          mapfile -t headers < <(
            find . -maxdepth 1 -type f -name "*.h" \
              ! -name "moc_*" \
              ! -name "ui_*" \
              ! -name "qrc_*" \
              | sort
          )

          echo "Headers trouvés :"
          printf ' - %s\n' "${headers[@]}"

          if [ ${#headers[@]} -eq 0 ]; then
            echo "Aucun header trouvé."
            exit 0
          fi

          # Construction des arguments -i fichier1 -i fichier2 ...
          args=()
          for f in "${headers[@]}"; do
            args+=(-i "$f")
          done

          # Génération du .puml
          hpp2plantuml "${args[@]}" -o architecture_auto.puml
          HPP_EXIT=$?

          if [ ! -f architecture_auto.puml ]; then
            echo "Erreur: architecture_auto.puml n'a pas été généré."
            exit 1
          fi

          # Nettoyage éventuel
          sed -n '/@startuml/,/@enduml/p' architecture_auto.puml > clean_arch.puml
          mv clean_arch.puml architecture_auto.puml

          echo "Contenu de architecture_auto.puml :"
          cat architecture_auto.puml

          if ! grep -q "@startuml" architecture_auto.puml; then
            echo "Erreur: le fichier PUML ne contient pas de diagramme valide."
            exit 1
          fi

          # Conversion SVG
          plantuml -tsvg architecture_auto.puml
          PLANT_EXIT=$?

          if [ $PLANT_EXIT -ne 0 ]; then
            echo "PlantUML a échoué. Vérifie la syntaxe générée ci-dessus."
            exit 1
          fi

          # Si hpp2plantuml a signalé des erreurs de parsing mais a quand même généré un diagramme,
          # on ne casse pas forcément le job avant la conversion.
          if [ $HPP_EXIT -ne 0 ]; then
            echo "hpp2plantuml a retourné un code non nul, probablement à cause d'un header mal parsé."
            echo "Le diagramme a quand même été tenté."
          fi

      - name: Générer la documentation Doxygen
        run: doxygen Doxyfile

      - name: Préparer les fichiers pour le déploiement
        run: |
          mkdir -p ./doc_output/html/images
          [ -f architecture_auto.svg ] && cp architecture_auto.svg ./doc_output/html/images/

      - name: Déployer sur GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./doc_output/html
