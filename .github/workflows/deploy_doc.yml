name: Génération Doc Doxygen

on:
  push:
    branches:
      - '**'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Vérifier le Doxyfile
        run: |
          if [ ! -f Doxyfile ]; then
            echo "Erreur : fichier Doxyfile introuvable à la racine du projet."
            exit 1
          fi

      - name: Générer la documentation Doxygen
        run: |
          doxygen Doxyfile

      - name: Vérifier le dossier HTML généré
        run: |
          if [ ! -d doc_output/html ]; then
            echo "Erreur : le dossier doc_output/html n'a pas été généré."
            echo "Vérifie dans ton Doxyfile que OUTPUT_DIRECTORY = doc_output"
            echo "et que GENERATE_HTML = YES"
            exit 1
          fi

      - name: Déployer sur GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./doc_output/html
