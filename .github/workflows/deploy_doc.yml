name: Génération Doc Doxygen et UML

on:
  push:
    branches:
      - '**'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer les outils
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz plantuml python3-pip
          pip install hpp2plantuml

      - name: Générer le diagramme UML
        shell: bash
        run: |
          set +e

          echo "===== Recherche headers ====="

          mapfile -t headers < <(
            find . -type f -name "*.h" \
              ! -name "moc_*" \
              ! -name "ui_*" \
              ! -name "qrc_*" \
              ! -path "*/build/*" \
              | sort
          )

          printf ' - %s\n' "${headers[@]}"

          if [ ${#headers[@]} -eq 0 ]; then
            echo "Aucun header trouvé"
            exit 0
          fi

          mkdir -p uml_tmp

          echo "===== Nettoyage macros Qt ====="

          for f in "${headers[@]}"; do
            out="uml_tmp/$(basename "$f")"

            sed -E '
              s/Q_OBJECT//g;
              s/Q_GADGET//g;
              s/Q_PROPERTY\s*\([^)]*\)//g;
              s/Q_SIGNAL//g;
              s/Q_SIGNALS/signals/g;
              s/Q_SLOT//g;
              s/Q_SLOTS/slots/g;
              s/Q_INVOKABLE//g;
              s/Q_ENUMS?\([^)]*\)//g;
              s/Q_FLAGS\([^)]*\)//g;
              s/Q_DECLARE_FLAGS\([^)]*\)//g;
              s/Q_DECLARE_OPERATORS_FOR_FLAGS\([^)]*\)//g;
              s/Q_EMIT//g;
              s/emit//g;
              s/signals:/public:/g;
              s/public slots:/public:/g;
              s/private slots:/private:/g;
              s/protected slots:/protected:/g;
              s/slots://g;
            ' "$f" > "$out"
          done

          echo "===== Génération PlantUML ====="

          args=()
          for f in uml_tmp/*.h; do
            args+=(-i "$f")
          done

          hpp2plantuml "${args[@]}" -o architecture_auto.puml || true

          if [ ! -f architecture_auto.puml ]; then
            echo "Diagramme non généré"
            exit 0
          fi

          echo "===== Nettoyage diagramme ====="

          sed -n '/@startuml/,/@enduml/p' architecture_auto.puml > tmp.puml
          mv tmp.puml architecture_auto.puml

          # supprimer auto-relations absurdes
          sed -E -i '/^([A-Za-z_][A-Za-z0-9_:]*) o-- \1$/d' architecture_auto.puml

          # supprimer doublons
          awk '!seen[$0]++' architecture_auto.puml > tmp.puml
          mv tmp.puml architecture_auto.puml

          echo "===== Diagramme final ====="
          cat architecture_auto.puml

          echo "===== Génération SVG ====="
          plantuml -tsvg architecture_auto.puml || true

      - name: Générer la documentation Doxygen
        run: doxygen Doxyfile

      - name: Copier UML dans la doc
        run: |
          mkdir -p doc_output/html/images
          if [ -f architecture_auto.svg ]; then
            cp architecture_auto.svg doc_output/html/images/
          fi

      - name: Déployer sur GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./doc_output/html
