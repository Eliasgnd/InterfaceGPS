- name: Générer le diagramme UML automatique
  shell: bash
  run: |
    set -euo pipefail

    mkdir -p uml_headers

    mapfile -t headers < <(
      find . -maxdepth 1 -type f -name "*.h" \
        ! -name "moc_*" \
        ! -name "ui_*" \
        ! -name "qrc_*" \
        | sort
    )

    echo "Headers trouvés :"
    printf ' - %s\n' "${headers[@]}"

    if [ ${#headers[@]} -eq 0 ]; then
      echo "Aucun header trouvé."
      exit 0
    fi

    # Copie nettoyée des headers pour aider CppHeaderParser avec Qt
    for f in "${headers[@]}"; do
      out="uml_headers/$(basename "$f")"

      sed -E '
        s/\bQ_OBJECT\b//g;
        s/\bQ_GADGET\b//g;
        s/\bQ_INVOKABLE\b//g;
        s/\bQ_SIGNAL\b//g;
        s/\bQ_SIGNALS\b/signals/g;
        s/\bQ_SLOT\b//g;
        s/\bQ_SLOTS\b/slots/g;
        s/\bQ_EMIT\b/emit/g;
        s/\bemit\b//g;
        s/\bQ_ENUMS?\([^)]*\)//g;
        s/\bQ_FLAGS\([^)]*\)//g;
        s/\bQ_DECLARE_FLAGS\([^)]*\)//g;
        s/\bQ_DECLARE_OPERATORS_FOR_FLAGS\([^)]*\)//g;
        s/\bQ_PROPERTY\s*\([^)]*\)//g;
        s/\bsignals\s*:/public:/g;
        s/\bpublic\s+slots\s*:/public:/g;
        s/\bprotected\s+slots\s*:/protected:/g;
        s/\bprivate\s+slots\s*:/private:/g;
        s/\bslots\s*://g;
      ' "$f" > "$out"
    done

    mapfile -t clean_headers < <(find uml_headers -type f -name "*.h" | sort)

    args=()
    for f in "${clean_headers[@]}"; do
      args+=(-i "$f")
    done

    hpp2plantuml "${args[@]}" -o architecture_auto.puml

    if [ ! -f architecture_auto.puml ]; then
      echo "Erreur: architecture_auto.puml n'a pas été généré."
      exit 1
    fi

    sed -n '/@startuml/,/@enduml/p' architecture_auto.puml > clean_arch.puml
    mv clean_arch.puml architecture_auto.puml

    echo "===== architecture_auto.puml ====="
    cat architecture_auto.puml

    grep -q "@startuml" architecture_auto.puml || {
      echo "Erreur: le fichier PUML ne contient pas de diagramme valide."
      exit 1
    }

    plantuml -tsvg architecture_auto.puml
